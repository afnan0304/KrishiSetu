name: Sync Issue Labels to PR

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  copy-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Copy linked issue labels to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const prBody = context.payload.pull_request.body || "";

            const regex = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi;

            const matches = [...prBody.matchAll(regex)];

            if (matches.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            const labelsToAdd = new Set();

            for (const match of matches) {
              const issueNumber = match[1];

              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              issue.data.labels.forEach(label => {
                labelsToAdd.add(label.name);
              });
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labelsToAdd]
              });

              console.log("Labels copied:", [...labelsToAdd]);
            }
